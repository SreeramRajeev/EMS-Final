<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin dashboard — VoltGrid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand"><span class="bolt">⚡</span><span>VoltGrid<small>Staff console</small></span></div>
    <nav id="vg-nav" data-active="overview"></nav>
    <div class="flex">
      <div class="who"><strong id="whoName"></strong><span id="whoMeta"></span></div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Log out</button>
    </div>
  </header>

  <main class="page">
    <p class="eyebrow">Control room</p>
    <h1>Grid overview</h1>
    <p class="muted mb-2">A live snapshot of the system, straight from the shared data store.</p>

    <section class="grid cols-4">
      <div class="glass stat"><div class="label">Customers</div><div class="value" id="statCustomers">—</div></div>
      <div class="glass stat"><div class="label">Employees</div><div class="value" id="statEmployees">—</div></div>
      <div class="glass stat"><div class="label">Open complaints</div><div class="value" id="statOpen">—</div><div class="trend" id="statOpenNote"></div></div>
      <div class="glass stat"><div class="label">Revenue collected</div><div class="value" id="statRevenue">—</div><div class="trend" id="statRevenueNote"></div></div>
    </section>

    <section class="glass mt-3">
      <div class="card-head">
        <h2>Complaints awaiting assignment</h2>
        <a class="btn btn-ghost btn-sm" href="complaintManagement.html">Manage all</a>
      </div>
      <div class="table-wrap">
        <table class="glass-table">
          <thead><tr><th>ID</th><th>Customer</th><th>Type</th><th>Raised</th><th>Status</th></tr></thead>
          <tbody id="openRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/chrome.js"></script>
  <script src="../js/admin/dashboard.js"></script>
</body>
</html>
