<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complaint management — VoltGrid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand"><span class="bolt">⚡</span><span>VoltGrid<small>Staff console</small></span></div>
    <nav id="vg-nav" data-active="complaints"></nav>
    <div class="flex">
      <div class="who"><strong id="whoName"></strong><span id="whoMeta"></span></div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Log out</button>
    </div>
  </header>

  <main class="page">
    <p class="eyebrow">Routing</p>
    <h1>Complaint management</h1>
    <p class="muted mb-2">Assign incoming complaints to the right employee and track progress.</p>

    <div class="glass">
      <div class="table-wrap">
        <table class="glass-table">
          <thead>
            <tr><th>ID</th><th>Customer</th><th>Type</th><th>Description</th><th>Status</th><th>Assign to</th></tr>
          </thead>
          <tbody id="complaintRows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/chrome.js"></script>
  <script src="../js/admin/complaintManagement.js"></script>
</body>
</html>
