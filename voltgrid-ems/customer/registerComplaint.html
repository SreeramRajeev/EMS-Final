<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register complaint — VoltGrid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand"><span class="bolt">⚡</span><span>VoltGrid<small>Customer</small></span></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="viewPayBill.html">Bills</a>
      <a href="connections.html">Connections</a>
      <a href="registerComplaint.html" class="active">New complaint</a>
      <a href="complaintStatus.html">My complaints</a>
    </nav>
    <div class="flex">
      <div class="who"><strong id="whoName"></strong><span id="whoMeta"></span></div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Log out</button>
    </div>
  </header>

  <main class="page" style="max-width:640px;">
    <p class="eyebrow">Support</p>
    <h1>Register a complaint</h1>
    <p class="muted mb-2">Tell us what's wrong — the team will pick it up shortly.</p>

    <div class="glass">
      <div id="alert" class="alert success"></div>

      <div class="field">
        <label for="type">Complaint type</label>
        <select id="type">
          <option value="">Choose a category…</option>
          <option>Power outage</option>
          <option>Voltage fluctuation</option>
          <option>Billing dispute</option>
          <option>Meter fault</option>
          <option>Damaged line / pole</option>
          <option>Other</option>
        </select>
        <div class="error-msg"></div>
      </div>

      <div class="field">
        <label for="description">Describe the issue</label>
        <textarea id="description" placeholder="When did it start? How often does it happen? Any landmarks near the fault?"></textarea>
        <div class="error-msg"></div>
      </div>

      <button id="submitBtn" class="btn btn-primary">Submit complaint</button>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/chrome.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/customer/registerComplaint.js"></script>
</body>
</html>
